<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AgriConnect - Edit Profile</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/auth.css') }}">
    <style>
        .edit-container {
            max-width: 600px;
            margin: 40px auto;
            background: var(--card-bg);
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            padding: 30px;
        }
        .edit-header {
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 15px;
            margin-bottom: 25px;
            display: flex;
            align-items: center;
            gap: 15px;
        }
        .edit-header h1 {
            font-size: 22px;
            font-weight: 700;
        }
        .edit-avatar-section {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-bottom: 25px;
        }
        .edit-avatar {
            width: 90px;
            height: 90px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid var(--border-color);
            margin-bottom: 10px;
        }
        .edit-form-group {
            margin-bottom: 20px;
        }
        .edit-form-group label {
            display: block;
            margin-bottom: 8px;
            font-size: 14px;
            color: var(--text-main);
            font-weight: 600;
        }
        .edit-input {
            width: 100%;
            padding: 12px 15px;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            font-size: 14px;
            outline: none;
            transition: border-color 0.2s;
        }
        .edit-input:focus {
            border-color: var(--primary-green);
        }
        textarea.edit-input {
            resize: vertical;
            min-height: 100px;
            font-family: 'Inter', sans-serif;
        }
        .edit-actions {
            display: flex;
            justify-content: flex-end;
            gap: 15px;
            margin-top: 30px;
        }
        .btn {
            padding: 10px 20px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            text-decoration: none;
            transition: 0.2s;
        }
        .btn-cancel {
            background: none;
            border: 1px solid var(--border-color);
            color: var(--text-muted);
        }
        .btn-cancel:hover {
            background: var(--bg-color);
            color: var(--text-main);
        }
        .btn-save {
            background: var(--primary-green);
            border: 1px solid var(--primary-green);
            color: white;
        }
        .btn-save:hover {
            background: var(--primary-green-hover);
        }
        .success-msg {
            background: #dcfce7;
            color: #166534;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
    </style>
</head>
<body>
    {% include 'partials/navbar.html' %}

    <main class="edit-container">
        <div class="edit-header">
            <a href="/" style="color: var(--text-muted);"><i class="fa-solid fa-arrow-left"></i></a>
            <h1>Edit Profile</h1>
        </div>
        
        {% if msg %}
        <div class="success-msg"><i class="fa-solid fa-circle-check"></i> {{ msg }}</div>
        {% endif %}
        {% if error %}
        <div class="auth-alert error" style="margin-bottom: 20px;">
            <i class="fa-solid fa-circle-exclamation"></i> {{ error }}
        </div>
        {% endif %}

        <div class="edit-avatar-section">
            <img src="{{ user.avatar_url }}" alt="Profile Avatar" class="edit-avatar">
            <p style="font-size: 12px; color: var(--text-muted);">Avatar is generated automatically</p>
        </div>

        <form action="/profile/edit" method="POST">
            <div class="edit-form-group">
                <label for="full_name">Full Name</label>
                <input type="text" id="full_name" name="full_name" class="edit-input" value="{{ user.full_name }}" required>
            </div>

            <div class="edit-form-group">
                <label for="title">Farm / Profession Title</label>
                <input type="text" id="title" name="title" class="edit-input" value="{{ user.title if user.title else '' }}" placeholder="e.g. Organic Wheat Farmer">
            </div>

            <div class="edit-form-group">
                <label for="location">Location</label>
                <input type="text" id="location" name="location" class="edit-input" value="{{ user.location if user.location else '' }}" placeholder="e.g. Punjab, India">
            </div>

            <div class="edit-form-group">
                <label for="bio">Bio</label>
                <textarea id="bio" name="bio" class="edit-input" placeholder="Tell the community about yourself...">{{ user.bio if user.bio else '' }}</textarea>
            </div>

            <div class="edit-actions">
                <a href="/" class="btn btn-cancel">Cancel</a>
                <button type="submit" class="btn btn-save">Save Changes</button>
            </div>
        </form>
    </main>
</body>
</html>
