<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Harvest Not Found | AgriConnect</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #1b873f;
            --secondary: #2eab59;
            --bg: #f8fafc;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Outfit', sans-serif;
            background: var(--bg);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #1e293b;
            overflow: hidden;
        }
        .container {
            text-align: center;
            max-width: 600px;
            padding: 40px;
            position: relative;
        }
        .error-code {
            font-size: 15rem;
            font-weight: 800;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            line-height: 1;
            margin-bottom: 20px;
            opacity: 0.1;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: -1;
        }
        .icon-wrap {
            font-size: 80px;
            color: var(--primary);
            margin-bottom: 30px;
            animation: float 3s ease-in-out infinite;
        }
        h1 { font-size: 32px; margin-bottom: 15px; font-weight: 700; highlight-color: var(--primary); }
        p { color: #64748b; font-size: 18px; margin-bottom: 35px; line-height: 1.6; }
        .back-btn {
            background: var(--primary);
            color: white;
            padding: 14px 35px;
            border-radius: 30px;
            text-decoration: none;
            font-weight: 600;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            transition: transform 0.2s, box-shadow 0.2s;
            box-shadow: 0 10px 25px rgba(27, 135, 63, 0.3);
        }
        .back-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 15px 30px rgba(27, 135, 63, 0.4);
        }
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
        }
        .leaves {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            pointer-events: none;
            z-index: -1;
        }
    </style>
</head>
<body>
    <div class="error-code">404</div>
    <div class="container">
        <div class="icon-wrap">
            <i class="fa-solid fa-leaf"></i>
        </div>
        <h1>Harvest Not Found</h1>
        <p>It seems the field you're looking for was left fallow. Let's head back to the main barn and start over.</p>
        <a href="/" class="back-btn">
            <i class="fa-solid fa-arrow-left"></i>
            Back to AgriConnect
        </a>
    </div>
</body>
</html>
